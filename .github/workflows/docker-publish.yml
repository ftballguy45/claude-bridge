name: docker-publish

# Build the bridge image and push it to the GitHub Container Registry on
# every push to main + every tag. Consumers reference the published image
# directly (image: ghcr.io/ftballguy45/claude-bridge:latest), no source
# copy required.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # GHCR repo paths must be lowercase. Force it explicitly.
          images: ghcr.io/${{ github.repository_owner }}/claude-bridge
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Linux/amd64 is the realistic deployment target for this bridge —
          # add linux/arm64 here later if Apple Silicon devs join in.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
